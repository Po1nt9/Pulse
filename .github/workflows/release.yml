name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'apps/tauri'
          cache-targets: false
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri
        run: npm run tauri:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.platform }}
          path: |
            apps/tauri/target/release/bundle/**
            apps/tauri/target/release/pulse
            apps/tauri/target/release/pulse.exe
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"

          # Collect all files (recursive, sorted)
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find artifacts -type f -print0 | sort -uz)

          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No artifacts found under artifacts/"
            exit 1
          fi

          echo "Files to upload (${#files[@]}):"
          printf '  %s\n' "${files[@]}"

          # Create as draft first (safer than partial publish on error)
          gh release create "$TAG" \
            --title "Pulse $TAG" \
            --notes 'See [CHANGELOG.md](https://github.com/Po1nt9/Pulse/blob/master/docs/CHANGELOG.md) for changes.' \
            --target "${{ github.sha }}" \
            --draft \
            "${files[@]}"

          # Un-draft unless explicitly marked as prerelease
          if [ "${{ inputs.prerelease }}" != "true" ]; then
            gh release edit "$TAG" --draft=false
          fi