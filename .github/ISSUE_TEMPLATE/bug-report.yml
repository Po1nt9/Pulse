name: Bug 报告
description: 报告一个 Bug 帮助我们改进
title: "[Bug]: "
labels: ["Bug", "待确认"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间报告这个问题！请填写以下信息帮助我们了解问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述这个问题
      placeholder: 告诉我发生了什么，以及你期望发生什么
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题的步骤
      placeholder: |
        1. 打开应用
        2. 点击某个功能
        3. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 清晰简洁地描述你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 请提供以下信息
      value: |
        - 操作系统: [例如 macOS 14.0, Windows 11, Ubuntu 22.04]
        - Pulse 版本: [例如 0.1.0]
        - 安装方式: [例如 DMG, MSI, AppImage]
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 添加任何其他上下文、截图或日志
    validations:
      required: false
