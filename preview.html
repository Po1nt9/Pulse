<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse - Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --water-bg: #0B1120;
      --water-surface: rgba(35, 45, 60, 0.82);
      --water-foam: #F0F9FF;
      --water-mist: rgba(220, 240, 255, 0.75);
      --water-mist-weak: rgba(220, 240, 255, 0.5);
      --water-current: #0EA5E9;
      --water-current-dim: rgba(14, 165, 233, 0.25);
      --water-warning: #F59E0B;
      --water-danger: #EF4444;
      --water-border: rgba(255, 255, 255, 0.08);
      --water-border-hover: rgba(255, 255, 255, 0.15);
      
      --font-display: "Inter", -apple-system, sans-serif;
      --font-body: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      --font-data: "JetBrains Mono", "SFMono-Regular", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1920&q=80') center/cover no-repeat;
      font-family: var(--font-body);
      color: var(--water-foam);
      padding: 40px;
      gap: 40px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 0;
    }

    /* ===== 弹窗基础 ===== */
    .popup {
      background: var(--water-surface);
      backdrop-filter: blur(40px) saturate(1.2);
      border: 1px solid var(--water-border);
      border-radius: 20px;
      overflow: hidden;
      animation: rippleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 1;
    }

    @keyframes rippleIn {
      from { opacity: 0; transform: scale(0.95) translateY(12px); filter: blur(4px); }
      to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }

    /* ===== 概览面板 ===== */
    .overview {
      width: 240px;
      padding: 14px 16px;
    }

    .overview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--water-border);
    }

    .overview-title {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      color: var(--water-mist);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .overview-menu {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--water-mist);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .overview-menu:hover { background: rgba(255,255,255,0.06); color: var(--water-foam); }

    .provider-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
    }

    .provider-item:hover { background: rgba(255,255,255,0.06); }
    .provider-item:hover .provider-balance { transform: scale(1.05); }

    .provider-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--water-foam);
      z-index: 1;
    }

    .provider-balance {
      font-family: var(--font-data);
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: proportional-nums;
      z-index: 1;
      transition: transform 0.2s ease;
    }

    .provider-balance.healthy { color: var(--water-current); }
    .provider-balance.warning { color: var(--water-warning); }
    .provider-balance.danger { color: var(--water-danger); }

    /* 状态指示灯 */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
      box-shadow: 0 0 4px currentColor;
    }

    .status-dot.healthy { background: var(--water-current); color: var(--water-current); }
    .status-dot.warning { background: var(--water-warning); color: var(--water-warning); }
    .status-dot.danger { background: var(--water-danger); color: var(--water-danger); }

    .provider-info {
      display: flex;
      align-items: center;
      z-index: 1;
    }

    /* ===== 详情面板 ===== */
    .detail {
      width: 320px;
      padding: 16px 20px 20px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .detail-back {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--water-mist);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .detail-back:hover { background: rgba(255,255,255,0.06); color: var(--water-foam); }

    .detail-provider {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--water-foam);
    }

    .detail-settings {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--water-mist);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .detail-settings:hover { background: rgba(255,255,255,0.06); color: var(--water-foam); }

    /* 余额区域 */
    .balance-section {
      text-align: center;
      margin-bottom: 16px;
    }

    .balance-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--water-mist);
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }

    .balance-value {
      font-family: var(--font-data);
      font-size: 36px;
      font-weight: 700;
      font-variant-numeric: proportional-nums;
      color: var(--water-foam);
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .balance-value .currency {
      font-size: 20px;
      font-weight: 600;
      color: var(--water-mist);
      margin-right: 2px;
    }

    /* 余额进度条 */
    .progress-tank {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      position: relative;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .progress-fill.healthy { 
      background: linear-gradient(90deg, #0EA5E9, #38BDF8);
      box-shadow: 0 0 8px rgba(14, 165, 233, 0.4);
    }
    .progress-fill.warning { 
      background: linear-gradient(90deg, #F59E0B, #FBBF24);
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.4);
    }
    .progress-fill.danger { 
      background: linear-gradient(90deg, #EF4444, #F87171);
      box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
      animation: pulse-danger 2s ease-in-out infinite;
    }

    @keyframes pulse-danger {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, 
        transparent 0%, 
        rgba(255,255,255,0.15) 50%, 
        transparent 100%
      );
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: var(--water-mist-weak);
    }

    .progress-label strong {
      color: var(--water-mist);
      font-weight: 600;
    }

    /* 指标卡片 */
    .metrics {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }

    .metric-card {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--water-border);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .metric-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--water-border-hover);
    }

    .metric-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--water-mist-weak);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .metric-value {
      font-family: var(--font-data);
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: proportional-nums;
      color: var(--water-foam);
    }

    /* 图表区域 */
    .chart-section {
      margin-top: 16px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .chart-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--water-mist);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s ease;
    }

    .chart-title:hover { color: var(--water-foam); }

    .chart-avg {
      font-family: var(--font-data);
      font-size: 11px;
      color: var(--water-mist-weak);
    }

    .chart-avg strong {
      color: var(--water-current);
      font-weight: 700;
    }

    .chart-container {
      height: 80px;
      display: flex;
      align-items: end;
      gap: 3px;
      padding: 0 4px;
    }

    .wave-bar {
      flex: 1;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, rgba(14, 165, 233, 0.5) 0%, rgba(14, 165, 233, 0.15) 100%);
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      min-height: 4px;
      animation: waveGrow 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      transform-origin: bottom;
    }

    @keyframes waveGrow {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }

    .wave-bar:hover {
      background: linear-gradient(180deg, rgba(14, 165, 233, 0.8) 0%, rgba(14, 165, 233, 0.4) 100%);
    }

    .wave-bar.active {
      background: linear-gradient(180deg, rgba(14, 165, 233, 0.9) 0%, rgba(14, 165, 233, 0.5) 100%);
    }

    .chart-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      padding: 0 4px;
    }

    .chart-label {
      font-family: var(--font-data);
      font-size: 9px;
      color: var(--water-mist-weak);
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      background: rgba(11, 17, 32, 0.95);
      border: 1px solid var(--water-border);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--water-foam);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 1000;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .tooltip.visible { opacity: 1; }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 2px;
    }

    .tooltip-row:last-child { margin-bottom: 0; }

    .tooltip-label { color: var(--water-mist); }
    .tooltip-value { font-family: var(--font-data); font-weight: 700; color: var(--water-current); }

    /* 底部刷新 */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--water-border);
    }

    .last-update {
      font-size: 10px;
      color: var(--water-mist-weak);
    }

    .refresh-btn {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--water-mist);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .refresh-btn:hover { background: rgba(255,255,255,0.06); color: var(--water-foam); }
    .refresh-btn.spinning { animation: spin 0.8s ease; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* 分隔 */
    .divider {
      width: 1px;
      background: var(--water-border);
      margin: 0 20px;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- 概览面板 -->
  <div class="popup overview">
    <div class="overview-header">
      <div class="overview-title">所有供应商</div>
      <div class="overview-menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="5" cy="12" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="19" cy="12" r="2"/>
        </svg>
      </div>
    </div>
    
    <div class="provider-item">
      <div class="provider-info">
        <div class="status-dot healthy"></div>
        <span class="provider-name">DeepSeek</span>
      </div>
      <span class="provider-balance healthy">¥128.50</span>
    </div>
    
    <div class="provider-item">
      <div class="provider-info">
        <div class="status-dot healthy"></div>
        <span class="provider-name">OpenRouter</span>
      </div>
      <span class="provider-balance healthy">$23.40</span>
    </div>
    
    <div class="provider-item">
      <div class="provider-info">
        <div class="status-dot danger"></div>
        <span class="provider-name">SiliconFlow</span>
      </div>
      <span class="provider-balance danger">¥0.50</span>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 详情面板 -->
  <div class="popup detail">
    <div class="detail-header">
      <div class="detail-back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 19l-7-7 7-7"/>
        </svg>
      </div>
      <div class="detail-provider">DeepSeek</div>
      <div class="detail-settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </div>
    </div>

    <div class="balance-section">
      <div class="balance-label">账户余额</div>
      <div class="balance-value"><span class="currency">¥</span>128.50</div>
      <div class="progress-tank">
        <div class="progress-fill healthy" style="width: 65%"></div>
      </div>
      <div class="progress-label">
        <span>已用 <strong>65%</strong></span>
        <span>总额 ¥200.00</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">消耗</div>
        <div class="metric-value">¥45.20</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Token</div>
        <div class="metric-value">8.6M</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Prompt</div>
        <div class="metric-value">5,234</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">
          近期用量
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 9l6 6 6-6"/>
          </svg>
        </div>
        <div class="chart-avg">均 <strong>¥4.52</strong></div>
      </div>
      <div class="chart-container" id="chart">
        <div class="wave-bar" style="height: 35%" data-time="09:00" data-cost="¥3.20" data-tokens="520K" data-prompts="142"></div>
        <div class="wave-bar" style="height: 58%" data-time="09:30" data-cost="¥5.80" data-tokens="980K" data-prompts="256"></div>
        <div class="wave-bar" style="height: 22%" data-time="10:00" data-cost="¥2.10" data-tokens="340K" data-prompts="89"></div>
        <div class="wave-bar" style="height: 75%" data-time="10:30" data-cost="¥8.50" data-tokens="1.2M" data-prompts="312"></div>
        <div class="wave-bar" style="height: 42%" data-time="11:00" data-cost="¥4.20" data-tokens="680K" data-prompts="178"></div>
        <div class="wave-bar" style="height: 65%" data-time="11:30" data-cost="¥6.30" data-tokens="890K" data-prompts="234"></div>
        <div class="wave-bar" style="height: 38%" data-time="12:00" data-cost="¥3.80" data-tokens="560K" data-prompts="156"></div>
        <div class="wave-bar" style="height: 55%" data-time="12:30" data-cost="¥5.10" data-tokens="780K" data-prompts="198"></div>
        <div class="wave-bar" style="height: 28%" data-time="13:00" data-cost="¥2.90" data-tokens="420K" data-prompts="112"></div>
        <div class="wave-bar active" style="height: 82%" data-time="13:30" data-cost="¥9.20" data-tokens="1.5M" data-prompts="389"></div>
      </div>
      <div class="chart-labels">
        <span class="chart-label">-5h</span>
        <span class="chart-label">-2.5h</span>
        <span class="chart-label">现在</span>
      </div>
    </div>

    <div class="footer">
      <span class="last-update">2 分钟前更新</span>
      <div class="refresh-btn" onclick="this.classList.toggle('spinning')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip">
    <div class="tooltip-row"><span class="tooltip-label">时间</span><span id="tt-time">--</span></div>
    <div class="tooltip-row"><span class="tooltip-label">消耗</span><span class="tooltip-value" id="tt-cost">--</span></div>
    <div class="tooltip-row"><span class="tooltip-label">Token</span><span class="tooltip-value" id="tt-tokens">--</span></div>
  </div>

  <script>
    // Tooltip 交互
    const tooltip = document.getElementById('tooltip');
    const ttTime = document.getElementById('tt-time');
    const ttCost = document.getElementById('tt-cost');
    const ttTokens = document.getElementById('tt-tokens');

    document.querySelectorAll('.wave-bar').forEach(bar => {
      bar.addEventListener('mouseenter', (e) => {
        ttTime.textContent = bar.dataset.time;
        ttCost.textContent = bar.dataset.cost;
        ttTokens.textContent = bar.dataset.tokens;
        
        const rect = bar.getBoundingClientRect();
        tooltip.style.left = (rect.left + rect.width / 2 - tooltip.offsetWidth / 2) + 'px';
        tooltip.style.top = (rect.top - tooltip.offsetHeight - 8) + 'px';
        tooltip.classList.add('visible');
      });
      
      bar.addEventListener('mouseleave', () => {
        tooltip.classList.remove('visible');
      });
    });

    // 刷新按钮动画重置
    document.querySelector('.refresh-btn').addEventListener('animationend', function() {
      this.classList.remove('spinning');
    });
  </script>
</body>
</html>
