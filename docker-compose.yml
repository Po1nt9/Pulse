services:
  pulse-dev:
    build: .
    container_name: pulse-dev
    volumes:
      - .:/app
      - /app/node_modules
      - /app/src-tauri/target
    ports:
      - "1420:1420"
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
    command: sh -c "if [ -f package.json ]; then npm run dev -- --host 0.0.0.0; else echo 'Pulse is not initialized yet. Run the implementation plan first.'; sleep infinity; fi"

  pulse-build:
    build: .
    container_name: pulse-build
    volumes:
      - .:/app
      - /app/node_modules
      - /app/src-tauri/target
    environment:
      - NODE_ENV=production
    command: sh -c "if [ -f package.json ]; then npm run build; else echo 'Pulse is not initialized yet. Run the implementation plan first.'; fi"
